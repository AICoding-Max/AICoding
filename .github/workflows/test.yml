name: Cross-platform tests

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Check video runtime imports
        run: python -c "import src.video_composer"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python files
        run: python -m compileall -q app.py main.py ui_app.py src tests
