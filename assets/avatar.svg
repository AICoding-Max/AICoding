<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <!-- 装饰环 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- 播放按钮外圈 -->
  <circle cx="100" cy="100" r="60" fill="rgba(0,0,0,0.3)"/>
  <circle cx="100" cy="100" r="55" fill="rgba(255,255,255,0.1)"/>
  <!-- 播放三角 -->
  <path d="M85 70 L85 130 L135 100 Z" fill="url(#play)"/>
  <!-- AI文字 -->
  <text x="100" y="175" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="18" font-weight="bold" letter-spacing="2">AICoding</text>
  <!-- 装饰点 -->
  <circle cx="40" cy="40" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="160" cy="40" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="170" cy="80" r="2" fill="rgba(255,255,255,0.3)"/>
</svg>
