<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator - 智能视频生成器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0a0a1a;--bg2:#12122a;--card:rgba(255,255,255,0.03);
            --border:rgba(255,255,255,0.08);--accent:#6366f1;--accent2:#8b5cf6;
            --cyan:#22d3ee;--text:#fff;--text2:rgba(255,255,255,0.6);
            --text3:rgba(255,255,255,0.4);--success:#10b981;--error:#ef4444;
            --gradient:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);
            --glass:rgba(255,255,255,0.05);--shadow:0 8px 32px rgba(0,0,0,0.4);
            --r:20px;--r2:12px
        }
        html{scroll-behavior:smooth}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 80%,rgba(99,102,241,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(139,92,246,0.15) 0%,transparent 50%);pointer-events:none;z-index:-1}
        .container{max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1}
        header{text-align:center;padding:50px 20px 30px}
        header h1{font-size:2.5rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
        header p{color:var(--text2);font-size:1.1rem}
        
        .stats{display:flex;justify-content:center;gap:40px;margin:30px 0;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);backdrop-filter:blur(10px)}
        .stat{text-align:center}
        .stat-val{font-size:1.8rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .stat-lbl{color:var(--text3);font-size:.8rem;margin-top:4px}
        
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px;backdrop-filter:blur(10px)}
        .card-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;background:var(--glass);cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
        .card-head:hover{background:rgba(255,255,255,0.08)}
        .card-head h2{display:flex;align-items:center;gap:10px;font-size:1.1rem}
        .card-head .icon{width:36px;height:36px;background:var(--gradient);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
        .card-head .toggle{color:var(--text3);font-size:.85rem;transition:transform .3s}
        .card-head.active .toggle{transform:rotate(180deg)}
        .card-body{display:none;padding:24px}
        .card-body.show{display:block}
        
        .svc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px}
        .svc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .svc-name{font-weight:600;display:flex;align-items:center;gap:8px}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success)}
        
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        @media(max-width:768px){.form-row{grid-template-columns:1fr}}
        .fg{display:flex;flex-direction:column;gap:6px}
        .fg.full{grid-column:1/-1}
        .fg label{font-size:.8rem;color:var(--text2);font-weight:500}
        .fg input,.fg select{padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;transition:border-color .3s}
        .fg input:focus,.fg select:focus{outline:none;border-color:var(--accent)}
        .fg .hint{font-size:.7rem;color:var(--text3);margin-top:2px}
        
        .btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
        .btn{padding:10px 20px;border:none;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .3s}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .btn-p{background:var(--gradient);color:#fff}
        .btn-p:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,0.4)}
        .btn-s{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border)}
        .btn-s:hover{border-color:var(--accent)}
        
        .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
        @media(max-width:768px){.modes{grid-template-columns:1fr}}
        .mode{padding:24px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .3s;text-align:center}
        .mode:hover{border-color:var(--accent)}
        .mode.active{border-color:var(--accent);background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.15));box-shadow:0 0 30px rgba(99,102,241,0.2)}
        .mode-icon{font-size:2.5rem;margin-bottom:12px}
        .mode-title{font-size:1rem;font-weight:600;margin-bottom:6px}
        .mode-desc{color:var(--text3);font-size:.8rem}
        
        .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
        @media(max-width:768px){.opts{grid-template-columns:1fr}}
        .opt{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
        .opt label{display:block;font-size:.75rem;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
        .opt select{width:100%;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text)}
        
        .input-section{margin-bottom:20px}
        .input-section textarea{width:100%;min-height:120px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:.95rem;resize:vertical}
        .input-section textarea:focus{outline:none;border-color:var(--accent)}
        
        .progress-bar{margin:20px 0;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);display:none}
        .progress-bar.show{display:block}
        .prog-header{display:flex;justify-content:space-between;margin-bottom:10px}
        .prog-pct{font-weight:600;color:var(--accent)}
        .prog-track{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
        .prog-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width .3s;width:0%}
        .prog-text{color:var(--text3);font-size:.85rem;margin-top:8px}
        
        .result{margin:24px 0;padding:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);display:none}
        .result.show{display:block}
        .result video{width:100%;max-width:640px;border-radius:var(--r2);margin-bottom:16px}
        .result-actions{display:flex;gap:10px;justify-content:center}
        
        .history{margin-top:30px}
        .history h3{font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:10px}
        .history-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
        .history-item{padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .3s}
        .history-item:hover{border-color:var(--accent);transform:translateY(-2px)}
        .history-item-name{font-weight:500;margin-bottom:4px}
        .history-item-size{color:var(--text3);font-size:.8rem}
        
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:.9rem;opacity:0;transition:opacity .3s;z-index:1000}
        .toast.show{opacity:1}
        .toast.success{border-color:var(--success)}
        .toast.error{border-color:var(--error)}
        
        .spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .api-config{margin-bottom:20px}
        .api-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
        .api-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .api-item-title{font-weight:600}
        .api-status{font-size:.75rem;padding:4px 8px;border-radius:4px;background:rgba(16,185,129,0.2);color:var(--success)}
        .api-status.error{background:rgba(239,68,68,0.2);color:var(--error)}
        
        footer{text-align:center;padding:40px 20px;color:var(--text3);font-size:.85rem}
        footer a{color:var(--accent);text-decoration:none}
        footer a:hover{text-decoration:underline}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Video Generator</h1>
            <p>智能视频生成器 - 文案/舞蹈/图片 一键生成短视频</p>
        </header>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="total-videos">0</div>
                <div class="stat-lbl">已生成视频</div>
            </div>
            <div class="stat">
                <div class="stat-val">3</div>
                <div class="stat-lbl">生成模式</div>
            </div>
            <div class="stat">
                <div class="stat-val">100%</div>
                <div class="stat-lbl">自定义配置</div>
            </div>
        </div>
        
        <!-- API配置 -->
        <div class="card">
            <div class="card-head active" onclick="toggleCard(this)">
                <h2><span class="icon">&#9881;</span> API 配置</h2>
                <span class="toggle">&#9660;</span>
            </div>
            <div class="card-body show" id="api-config-body">
                <p style="color:var(--text2);margin-bottom:16px;font-size:.9rem;">
                    支持任何 OpenAI 兼容格式的 API。填入你的 API Key 和 Base URL，点击获取模型。
                </p>
                <div id="api-services"></div>
                <div class="btn-row">
                    <button class="btn btn-s" onclick="addService()">+ 添加服务</button>
                    <button class="btn btn-p" onclick="saveConfig()">保存配置</button>
                </div>
            </div>
        </div>
        
        <!-- 生成模式 -->
        <div class="card">
            <div class="card-head active" onclick="toggleCard(this)">
                <h2><span class="icon">&#127909;</span> 生成模式</h2>
                <span class="toggle">&#9660;</span>
            </div>
            <div class="card-body show">
                <div class="modes">
                    <div class="mode active" data-mode="classic" onclick="switchMode('classic',this)">
                        <div class="mode-icon">&#128221;</div>
                        <div class="mode-title">文生视频</div>
                        <div class="mode-desc">输入文案生成视频</div>
                    </div>
                    <div class="mode" data-mode="dance" onclick="switchMode('dance',this)">
                        <div class="mode-icon">&#128131;</div>
                        <div class="mode-title">舞蹈生成</div>
                        <div class="mode-desc">生成人物舞蹈视频</div>
                    </div>
                    <div class="mode" data-mode="i2v" onclick="switchMode('i2v',this)">
                        <div class="mode-icon">&#128444;</div>
                        <div class="mode-title">图生视频</div>
                        <div class="mode-desc">图片动态化</div>
                    </div>
                </div>
                
                <div class="opts">
                    <div class="opt">
                        <label>视频时长</label>
                        <select id="duration">
                            <option value="5">5秒</option>
                            <option value="10" selected>10秒</option>
                            <option value="15">15秒</option>
                            <option value="30">30秒</option>
                        </select>
                    </div>
                    <div class="opt">
                        <label>画面比例</label>
                        <select id="aspect">
                            <option value="9:16" selected>9:16 竖屏</option>
                            <option value="16:9">16:9 横屏</option>
                            <option value="1:1">1:1 方形</option>
                        </select>
                    </div>
                    <div class="opt">
                        <label>风格预设</label>
                        <select id="style-prefix">
                            <option value="">默认</option>
                            <option value="cinematic, 4k, HDR">电影级</option>
                            <option value="anime style">动漫风</option>
                            <option value="realistic, photorealistic">写实风</option>
                            <option value="watercolor painting">水彩风</option>
                        </select>
                    </div>
                </div>
                
                <!-- 文生视频输入 -->
                <div class="input-section" id="classic-input">
                    <textarea id="text" placeholder="输入视频描述或文案...&#10;&#10;例如：一只可爱的小猫在花园里玩耍，阳光明媚，微风轻拂"></textarea>
                </div>
                
                <!-- 舞蹈生成输入 -->
                <div class="input-section" id="dance-input" style="display:none">
                    <div class="form-row">
                        <div class="fg">
                            <label>舞蹈风格</label>
                            <select id="dance-style">
                                <option value="hip hop">Hip Hop</option>
                                <option value="k-pop">K-Pop</option>
                                <option value="ballet">芭蕾舞</option>
                                <option value="street dance">街舞</option>
                                <option value="contemporary">现代舞</option>
                                <option value="latin">拉丁舞</option>
                            </select>
                        </div>
                        <div class="fg">
                            <label>人物描述</label>
                            <input type="text" id="char" placeholder="e.g. 一个穿红裙的女孩">
                        </div>
                    </div>
                    <div class="fg full" style="margin-top:14px">
                        <label>场景</label>
                        <input type="text" id="scene" placeholder="e.g. 舞台, 城市街道, 海滩">
                    </div>
                </div>
                
                <!-- 图生视频输入 -->
                <div class="input-section" id="i2v-input" style="display:none">
                    <div class="fg">
                        <label>图片URL</label>
                        <input type="text" id="img-url" placeholder="输入图片链接">
                    </div>
                    <div class="fg" style="margin-top:14px">
                        <label>动态效果</label>
                        <input type="text" id="motion" placeholder="e.g. 缓慢移动, 摇摆, 缩放">
                    </div>
                </div>
                
                <div class="btn-row">
                    <button class="btn btn-p" id="gen-btn" onclick="generate()">
                        <span class="spinner" id="spinner"></span>
                        <span id="btn-text">&#128640; 开始生成</span>
                    </button>
                </div>
                
                <div class="progress-bar" id="prog">
                    <div class="prog-header">
                        <span class="prog-text" id="prog-text">准备中...</span>
                        <span class="prog-pct" id="prog-pct">0%</span>
                    </div>
                    <div class="prog-track">
                        <div class="prog-fill" id="prog-fill"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 结果展示 -->
        <div class="result" id="result">
            <h3 style="margin-bottom:16px">&#127909; 生成结果</h3>
            <video id="vid" controls></video>
            <div class="result-actions">
                <button class="btn btn-p" id="dl-btn">&#128190; 下载视频</button>
                <button class="btn btn-s" onclick="document.getElementById('result').classList.remove('show')">&#10006; 关闭</button>
            </div>
        </div>
        
        <!-- 历史记录 -->
        <div class="history">
            <h3>&#128193; 最近生成</h3>
            <div class="history-list" id="h-list">
                <p style="color:var(--text3);text-align:center;grid-column:1/-1;padding:30px">暂无记录</p>
            </div>
        </div>
        
        <footer>
            <p>AI Video Generator - 让创作更简单</p>
            <p style="margin-top:8px">
                <a href="https://github.com/zq15189325783-jpg/ai-video-generator" target="_blank">GitHub</a> | 
                支持 OpenAI 兼容 API
            </p>
        </footer>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let apiServices = [];
        let mode = 'classic';
        let running = false;
        
        function toggleCard(el) {
            el.classList.toggle('active');
            const body = el.nextElementSibling;
            body.classList.toggle('show');
        }
        
        function addService() {
            const idx = apiServices.length;
            apiServices.push({ name: '服务 ' + (idx + 1), url: '', key: '', video_model: '', llm_model: '' });
            renderServices();
        }
        
        function removeService(idx) {
            apiServices.splice(idx, 1);
            renderServices();
        }
        
        function renderServices() {
            const container = document.getElementById('api-services');
            container.innerHTML = apiServices.map((s, i) => `
                <div class="api-item">
                    <div class="api-item-header">
                        <span class="api-item-title">${s.name || '服务 ' + (i + 1)}</span>
                        <button class="btn btn-d" onclick="removeService(${i})" style="padding:6px 12px;font-size:.75rem">删除</button>
                    </div>
                    <div class="form-row">
                        <div class="fg">
                            <label>API名称</label>
                            <input type="text" value="${s.name}" onchange="apiServices[${i}].name=this.value" placeholder="e.g. SiliconFlow">
                        </div>
                        <div class="fg">
                            <label>Base URL</label>
                            <input type="text" value="${s.url}" onchange="apiServices[${i}].url=this.value" placeholder="https://api.example.com/v1">
                        </div>
                    </div>
                    <div class="form-row" style="margin-top:12px">
                        <div class="fg">
                            <label>API Key</label>
                            <input type="password" value="${s.key}" onchange="apiServices[${i}].key=this.value" placeholder="sk-...">
                        </div>
                        <div class="fg">
                            <label>&nbsp;</label>
                            <button class="btn btn-s" onclick="fetchModels(${i})">获取模型</button>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top:12px">
                        <div class="fg">
                            <label>视频模型</label>
                            <select id="vm-${i}">
                                <option value="">-- 先获取模型 --</option>
                            </select>
                        </div>
                        <div class="fg">
                            <label>LLM模型</label>
                            <select id="lm-${i}">
                                <option value="">-- 先获取模型 --</option>
                            </select>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadConfig() {
            try {
                const resp = await fetch('/api/config');
                const data = await resp.json();
                apiServices = data.services || [];
                document.getElementById('tts-voice').value = data.tts_voice || 'zh-CN-XiaoxiaoNeural';
                renderServices();
                
                // Load models for each service
                apiServices.forEach((s, i) => {
                    if (s.url && s.key) fetchModels(i);
                });
            } catch (e) {
                console.error('Load config error:', e);
            }
        }
        
        async function fetchModels(idx) {
            const s = apiServices[idx];
            if (!s.url || !s.key) {
                showToast('请先填写URL和Key', 'error');
                return;
            }
            
            try {
                const resp = await fetch('/api/models', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_url: s.url, api_key: s.key })
                });
                const data = await resp.json();
                
                const videoSelect = document.getElementById('vm-' + idx);
                const llmSelect = document.getElementById('lm-' + idx);
                
                videoSelect.innerHTML = '<option value="">-- 选择视频模型 --</option>';
                llmSelect.innerHTML = '<option value="">-- 选择LLM模型 --</option>';
                
                (data.video || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.name || m.id;
                    videoSelect.appendChild(opt);
                });
                
                (data.llm || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.name || m.id;
                    llmSelect.appendChild(opt);
                });
                
                if (s.video_model) videoSelect.value = s.video_model;
                if (s.llm_model) llmSelect.value = s.llm_model;
                
                showToast('模型列表已更新', 'success');
            } catch (e) {
                showToast('获取模型失败: ' + e.message, 'error');
            }
        }
        
        async function saveConfig() {
            apiServices.forEach((s, i) => {
                s.video_model = document.getElementById('vm-' + i)?.value || '';
                s.llm_model = document.getElementById('lm-' + i)?.value || '';
            });
            
            try {
                const resp = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        services: apiServices,
                        tts_voice: document.getElementById('tts-voice')?.value || 'zh-CN-XiaoxiaoNeural'
                    })
                });
                showToast(resp.ok ? '配置已保存' : '保存失败', resp.ok ? 'success' : 'error');
            } catch (e) {
                showToast('保存失败', 'error');
            }
        }
        
        function switchMode(m, el) {
            mode = m;
            document.querySelectorAll('.mode').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('classic-input').style.display = m === 'classic' ? 'block' : 'none';
            document.getElementById('dance-input').style.display = m === 'dance' ? 'block' : 'none';
            document.getElementById('i2v-input').style.display = m === 'i2v' ? 'block' : 'none';
        }
        
        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + type;
            setTimeout(() => el.classList.remove('show'), 3000);
        }
        
        async function generate() {
            if (running) return;
            running = true;
            
            const btn = document.getElementById('gen-btn');
            document.getElementById('spinner').style.display = 'inline-block';
            document.getElementById('btn-text').textContent = '生成中...';
            btn.disabled = true;
            document.getElementById('prog').classList.add('show');
            document.getElementById('result').classList.remove('show');
            
            let body = {
                mode: mode,
                duration: document.getElementById('duration').value,
                aspect: document.getElementById('aspect').value,
                style_prefix: document.getElementById('style-prefix').value
            };
            
            if (mode === 'classic') {
                body.text = document.getElementById('text').value;
            } else if (mode === 'dance') {
                body.style = document.getElementById('dance-style').value;
                body.char = document.getElementById('char').value;
                body.scene = document.getElementById('scene').value;
            } else if (mode === 'i2v') {
                body.image = document.getElementById('img-url').value;
                body.motion = document.getElementById('motion').value;
            }
            
            try {
                const resp = await fetch('/api/gen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.err || '生成失败');
                }
                
                pollProgress();
            } catch (e) {
                showToast(e.message, 'error');
                resetUI();
            }
        }
        
        async function pollProgress() {
            try {
                const resp = await fetch('/api/progress');
                const data = await resp.json();
                
                document.getElementById('prog-fill').style.width = data.pct + '%';
                document.getElementById('prog-pct').textContent = data.pct + '%';
                document.getElementById('prog-text').textContent = data.msg;
                
                if (data.status === 'done') {
                    const videoPath = '/video/' + data.path.split(/[\\/]/).pop();
                    document.getElementById('vid').src = videoPath;
                    document.getElementById('dl-btn').onclick = function() {
                        const a = document.createElement('a');
                        a.href = videoPath;
                        a.download = 'video.mp4';
                        a.click();
                    };
                    document.getElementById('result').classList.add('show');
                    loadHistory();
                    resetUI();
                    showToast('视频生成完成！', 'success');
                } else if (data.status === 'err') {
                    showToast('错误: ' + data.msg, 'error');
                    resetUI();
                } else {
                    setTimeout(pollProgress, 1000);
                }
            } catch (e) {
                showToast('获取进度失败', 'error');
                resetUI();
            }
        }
        
        function resetUI() {
            running = false;
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('btn-text').textContent = '🚀 开始生成';
            document.getElementById('gen-btn').disabled = false;
            setTimeout(() => document.getElementById('prog').classList.remove('show'), 2000);
        }
        
        async function loadHistory() {
            try {
                const resp = await fetch('/api/videos');
                const data = await resp.json();
                const list = document.getElementById('h-list');
                document.getElementById('total-videos').textContent = data.length;
                
                if (!data.length) {
                    list.innerHTML = '<p style="color:var(--text3);text-align:center;grid-column:1/-1;padding:30px">暂无记录</p>';
                    return;
                }
                
                list.innerHTML = data.map(v => `
                    <div class="history-item" onclick="playVideo('${v.name}')">
                        <div class="history-item-name">${v.name.replace('.mp4', '')}</div>
                        <div class="history-item-size">${(v.size / 1024 / 1024).toFixed(2)} MB</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        function playVideo(name) {
            const videoPath = '/video/' + name;
            document.getElementById('vid').src = videoPath;
            document.getElementById('dl-btn').onclick = function() {
                const a = document.createElement('a');
                a.href = videoPath;
                a.download = name;
                a.click();
            };
            document.getElementById('result').classList.add('show');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            loadHistory();
        });
    </script>
</body>
</html>
